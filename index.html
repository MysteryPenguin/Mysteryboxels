<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Replit</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>

  <body>
    <main id="main" class="screen">
      <div style="display: flex; flex-direction: column; gap: 10px">
        <canvas
          id="game"
          class="canvas"
          style="
            border: 1px solid black;
            image-rendering: pixelated;
            grid-area: canvas;
            width: 60svw;
            height: 40svw;
          "
        >
        </canvas>
        <div class="toolbar" style="" id="toolbar">
          <div class="settings-list">
            <button id="pause" class="settings-button" style="width: 75px">
              Pause
            </button>
            <button id="shrink" class="settings-button">-</button>
            <button id="grow" class="settings-button">+</button>
            <button id="clear" class="settings-button">Clear</button>
            <button id="select" class="settings-button" style="width: 75px">
              Select
            </button>
            <button id="heat" class="settings-button" style="color: red">
              Heat
            </button>
            <button id="cool" class="settings-button" style="color: blue">
              Cool
            </button>
          </div>
          <div class="element-list" id="element-list"></div>
        </div>
      </div>
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 10px;
          justify-content: start;
          align-items: start;
          height: 70svh;
        "
      >
        <div class="global-props" style="flex: 1" id="global-props">
          <h3>Global Props</h3>
          <div class="range-input-settings">
            <label>Gravity</label
            ><input
              type="range"
              id="gravity"
              value="9.81"
              min="-100"
              max="100"
              step="0.1"
            />
            <div id="gravity-value" style="display: flex; align-items: center">
              <input
                value="9.81"
                style="outline: none; width: 50px"
                id="gravity-input"
              />m/s²
            </div>
          </div>
          <div class="range-input-settings">
              <label>Tick</label
              ><input
                type="range"
                id="tick"
                value="20"
                min="0"
                max="1000"
                step="1"
              />
              <div id="tick-value" style="display: flex; align-items: center">
                <input
                  value="20"
                  style="outline: none; width: 50px"
                  id="tick-input"
                />Hz
              </div>
            </div>
          </div>
        <div class="details" style="flex: 1;" id="details">
          <h3>Details</h3>
        </div>
        </div>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
